name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-tests:
    name: Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --group dev
      - run: uv run pytest -v
        # pyproject.toml pins --cov-fail-under=80

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: cd backend && uv sync --group dev
      - run: cd backend && PYTHONPATH=../src:src uv run pytest -v
        # pyproject.toml pins --cov-fail-under=80

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
