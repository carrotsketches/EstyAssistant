name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      stack_name:
        description: "CloudFormation stack name"
        required: false
        default: "etsy-assistant"
      region:
        description: "AWS region"
        required: false
        default: "us-east-1"

# Required for AWS OIDC federation. Secrets stay in GitHub;
# no long-lived AWS keys are stored anywhere.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        working-directory: infra
        run: sam build

      - name: SAM deploy
        working-directory: infra
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          ALARM_EMAIL: ${{ vars.ALARM_EMAIL }}
        run: |
          sam deploy \
            --stack-name "${{ inputs.stack_name }}" \
            --region "${{ inputs.region }}" \
            --resolve-image-repos \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "CorsOrigins=${CORS_ORIGINS:-http://localhost:3000}" \
              "FrontendUrl=${FRONTEND_URL:-http://localhost:3000}" \
              "AlarmEmail=${ALARM_EMAIL:-}" \
              "AnthropicApiKey=${ANTHROPIC_API_KEY:-}" \
              "EtsyApiKey=${ETSY_API_KEY:-}"

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "${{ inputs.stack_name }}" \
            --region "${{ inputs.region }}" \
            --query 'Stacks[0].Outputs' \
            --output table
